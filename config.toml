# ==========================================
# AI Image Renamer Configuration / 配置文件
# ==========================================
# Note: Values here can be overridden by config.local.toml and .env.
# 注意：这里的配置可被 config.local.toml 和 .env 覆盖。

# ------------------------------------------
# API Settings / API 设置
# ------------------------------------------
api_base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
model_name = "qwen3.5-122b-a10b"
max_tokens = 30000
# proxy_url = "http://127.0.0.1:7890"

# ------------------------------------------
# Execution Settings / 运行设置
# ------------------------------------------
concurrent_requests = 2
retry_delay = 30

# ------------------------------------------
# File Settings / 文件设置
# ------------------------------------------
image_directory = ""
supported_extensions = [".png", ".jpg", ".jpeg", ".webp", ".gif", ".bmp"]
default_profile = "emotion"

# Legacy inline prompt fallback / 旧版内联 prompt 兜底
prompt = "Please describe the image content in a short filename-friendly phrase."
